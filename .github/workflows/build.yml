name: Build Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, linux, x64]
    permissions:
      contents: write
    env:
      CCACHE_DIR: /home/yzd/actions-ccache
      CCACHE_MAX_SIZE: 10G

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            libguestfs-tools xfsprogs dosfstools mtools bc flex bison ccache

      - name: Build SD image
        run: ./build.sh --target sd 2>&1 | tee build-sd.log

      - name: Build eMMC image
        # Reuses cached kernel/rootfs from SD build, only stage 7 (image) does real work
        run: ./build.sh --target emmc 2>&1 | tee build-emmc.log

      - name: Build NVMe image
        run: ./build.sh --target nvme 2>&1 | tee build-nvme.log

      - name: Check outputs
        run: ls -lh output/

      - name: Generate checksums
        run: |
          cd output
          shopt -s nullglob
          for f in *.img.zst *.pkg.tar.zst image-info.txt; do
            [ -f "$f" ] && sha256sum "$f" >> checksums.txt
          done
          cat checksums.txt

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: "Orange Pi 5 Plus Image ${{ github.ref_name }}"
          body: |
            ## Orange Pi 5 Plus Arch Linux ARM Image

            ### 构建产物
            - `orangepi5-plus-sd-*.img.zst` — SD 卡镜像（U-Boot 写入镜像头）
            - `orangepi5-plus-emmc-*.img.zst` — eMMC 模块镜像（U-Boot 写入镜像头）
            - `orangepi5-plus-nvme-*.img.zst` — NVMe 磁盘镜像（U-Boot 预期在 SPI Flash）
            - `linux-op5p-*.pkg.tar.zst` — 内核与内核头软件包，适用于已有系统

            ### 刷写
            ```bash
            # SD / eMMC（无需解压）
            zstdcat orangepi5-plus-*-YYYYMMDD.img.zst | dd of=/dev/sdX bs=4M status=progress

            # NVMe（需先将 U-Boot 写入 SPI Flash）
            # 见 docs/spi-nvme-boot.md
            ```

            默认 root 登录（串口 ttyS2, 1500000 baud）。
          artifacts: |
            output/*.img.zst
            output/*.pkg.tar.zst
            output/image-info.txt
            output/checksums.txt
          allowUpdates: true
          makeLatest: true
          draft: false
          prerelease: false
