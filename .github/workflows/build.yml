name: Build Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CCACHE_DIR: /tmp/ccache
  CCACHE_MAX_SIZE: 2G

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target: [sd, emmc, nvme]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            libguestfs-tools xfsprogs dosfstools mtools bc flex bison ccache \
            libarchive-tools parted libgnutls28-dev libssl-dev swig python3 python3-pip \
            python3-dev python-is-python3 libelf-dev openssl

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: /tmp/ccache
          key: ccache-${{ runner.os }}-${{ hashFiles('build.sh') }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Build ${{ matrix.target }} image
        run: ./build.sh --target ${{ matrix.target }}
        env:
          BUILD_JOBS: 2

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: output-${{ matrix.target }}
          path: output/*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          find artifacts -type f \( -name '*.img.zst' -o -name '*.pkg.tar.zst' \) \
            -exec sha256sum {} \; | tee artifacts/checksums.txt

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: "Orange Pi 5 Plus Image ${{ github.ref_name }}"
          body: |
            ## Orange Pi 5 Plus Arch Linux ARM Image

            **Kernel**: 7.0.10 | **Build**: ${{ github.ref_name }}

            ### Images
            - `orangepi5-plus-sd-*.img.zst` — SD 卡镜像
            - `orangepi5-plus-emmc-*.img.zst` — eMMC 模块镜像
            - `orangepi5-plus-nvme-*.img.zst` — NVMe 磁盘镜像

            ### Packages
            - `linux-op5p-*.pkg.tar.zst` — 内核包
            - `linux-op5p-headers-*.pkg.tar.zst` — 内核头文件包

            ### Flash
            ```bash
            zstdcat orangepi5-plus-*-YYYYMMDD.img.zst | dd of=/dev/sdX bs=4M status=progress
            ```
          artifacts: artifacts/**/*
          artifactContentType: application/zstd
          allowUpdates: true
          makeLatest: true
          draft: false
          prerelease: false
